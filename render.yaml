services:
  - type: web
    name: pharma-express-ci
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    runtime: node
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /api/health
    numInstances: 1
    region: oregon
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 80
      targetCPUPercent: 80

databases:
  - name: pharma-express-db
    databaseName: pharma_express
    user: pharma_user
    plan: starter